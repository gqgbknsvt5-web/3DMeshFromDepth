name: Build IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Xcodeのバージョン指定を削除し、システム標準を使用するように変更
      - name: Build Archive (No Signing)
        run: |
          xcodebuild archive \
            -project *.xcodeproj \
            -scheme $(xcodebuild -list -project *.xcodeproj | grep "Schemes:" -A 2 | tail -1 | xargs) \
            -configuration Release \
            -archivePath output.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create IPA Structure
        run: |
          mkdir -p Payload
          cp -r output.xcarchive/Products/Applications/*.app Payload/
          zip -r 3DMeshFromDepth.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3DMeshFromDepth-IPA
          path: 3DMeshFromDepth.ipa
